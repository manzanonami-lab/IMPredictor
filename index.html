<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lottery Predictor</title>
<style>
    body { font-family: Arial, sans-serif; padding: 20px; background: #f5f5f5; }
    h1 { text-align: center; color: #333; }
    form { max-width: 400px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 6px rgba(0,0,0,0.2); }
    input, select, button { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; border: 1px solid #ccc; font-size: 16px; }
    button { background: #007BFF; color: white; border: none; cursor: pointer; }
    button:hover { background: #0056b3; }
    .result { max-width: 400px; margin: 20px auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 6px rgba(0,0,0,0.2); font-size: 16px; }
    .parity { font-weight: bold; font-size: 20px; }
    .parity.Odd { color: red; }
    .parity.Even { color: green; }
    .numbers { margin-top: 10px; }
    .numbers span { padding: 5px 10px; margin: 2px; border-radius: 5px; display: inline-block; font-weight: bold; font-size: 18px; }
    .hot { background: #FFD700; color: #000; }
    .cold { background: #B0C4DE; color: #000; }
</style>
</head>
<body>

<h1>Lottery Predictor</h1>

<form id="drawForm">
    <label>Timestamp:</label>
    <input type="datetime-local" id="timestamp" required>

    <label>Issue Number:</label>
    <input type="text" id="issue" placeholder="e.g. 8260315237" required>

    <label>Winning Number (1-80):</label>
    <input type="number" id="number" min="1" max="80" required>

    <label>Result:</label>
    <select id="result" required>
        <option value="Odd">Odd</option>
        <option value="Even">Even</option>
    </select>

    <button type="submit">Add Result & Predict</button>
</form>

<div class="result" id="predictionResult" style="display:none;">
    <h2>Prediction</h2>
    <p class="parity" id="parity"></p>

    <div class="numbers">
        <p>Top 3 Hot Numbers:</p>
        <div id="top3"></div>
    </div>

    <div class="numbers">
        <p>Cold Numbers:</p>
        <div id="cold3"></div>
    </div>

    <p id="streaks"></p>
</div>

<script>
const form = document.getElementById('drawForm');
const predictionDiv = document.getElementById('predictionResult');

form.addEventListener('submit', async (e) => {
    e.preventDefault();

    const timestamp = document.getElementById('timestamp').value;
    const issue = document.getElementById('issue').value;
    const number = parseInt(document.getElementById('number').value);
    const result = document.getElementById('result').value;

    // Add result
    await fetch('https://your-app.onrender.com/add-result', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ timestamp, issue, number, result })
    });

    // Get prediction
    const predictResponse = await fetch('https://your-app.onrender.com/predict');
    const predictData = await predictResponse.json();

    predictionDiv.style.display = 'block';

    // Parity prediction with color
    const parityEl = document.getElementById('parity');
    parityEl.innerText = `Next Parity Prediction: ${predictData.parity_prediction}`;
    parityEl.className = `parity ${predictData.parity_prediction}`;

    // Top 3 hot numbers
    const top3El = document.getElementById('top3');
    top3El.innerHTML = predictData.top3_numbers.map(n => `<span class="hot">${n}</span>`).join('');

    // Cold numbers
    const cold3El = document.getElementById('cold3');
    cold3El.innerHTML = predictData.cold3_numbers.map(n => `<span class="cold">${n}</span>`).join('');

    // Streaks
    document.getElementById('streaks').innerText = 
        `Max Odd Streak: ${predictData.max_odd_streak}, Max Even Streak: ${predictData.max_even_streak}`;
});
</script>

</body>
</html>
